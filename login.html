<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
    <!--선텍자는 id선택자 태그(h1,input,div)선택자-->

    <style>
         #aa{
            background-color: aquamarine;
            width: 100%;
            font-size: 30px;
         }
         input{
            background-color: aquamarine;
            width: 100%;
            font-size: 30px;
         }
         .mydiv{
            border: 3px solid black;
            padding: 10px;
         }
         button{
            color: white;
            background-color: rgb(250,100,100);
            padding: 10px;
            margin: 1rem;
            border: none;
            cursor: pointer;
         }
         button:hover{
            background-color: blue;
         }
    </style>
</head>
<body>
    <div class="mydiv">
        <label for="aa">id</label>
        <input type="text"name="" id="aa">
    </div>
    <div>

    <button>
        로그인
