<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" name="" id="num1">
    <input type="text" name="" id="num2">
    <button id='sum'>더하기</button>
    <div id="print"></div>

    
</body>
</html>
<script>

    document.getElementById('sum').onclick = function(){
        var result =
       Number( document.getElementById('num1').value)
         + Number(document.getElementById('num2').value);
        console.log(result);
        document.getElementById('print').textContent = result;

    }

</script>
